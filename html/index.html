<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>NitroGear</title>
</head>
<body>
    <header>
        <section id="header">
            <div class="header-left">
                <img id="header-logo" src="/assets/logo.png" alt="Logo da NitroGear">
            </div>
            <div class="header-middle">
                <div class="search-bar">
                    <div class="search-box">
                        <p>Buscar equipamentos...</p><img src="/assets/svg/search.svg">
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="account">
                    <p>Login</p><img src="/assets/svg/user.svg">
                </div>
                <div class="checkout-cart">
                    <p>0 itens</p><img src="/assets/svg/cart.svg">
                </div>
            </div>
            <div class="header-top-categories">
                <div class="categories-menu">
                    <p>Placas de Vídeo</p>
                    <p>Monitores</p>
                    <p>Periféricos</p>
                    <p>Promoções</p>
                </div>
            </div>
        </section>
    </header>
    <main>
        <section>
            <div id="hero">
                <div class="carrossel-container">
                    <div class="carrossel-slides">
                    <!-- Imagens do Carrossel -->
                        <div class="slide">
                            <img class="container" src="/assets/gtx1650.webp" alt="Imagem da Placa de Vídeo NVIDIA GTX 1850">
                            <a href="#" type="button" class="know-more-btn">Saiba Mais</a>
                        </div>
                        <div class="slide">
                            <img class="container" src="/assets/rx550.jpg" alt="Imagem da Placa de Vídeo AMD RX550">
                            <a href="#" type="button" class="know-more-btn">Saiba Mais</a>
                        </div>
                        <div class="slide">
                            <img class="container" src="/assets/monitor.webp" alt="Imagem do Monitor Gamer NitroVision 21.5">
                            <a href="#" type="button" class="know-more-btn">Saiba Mais</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <section>

        </section>
    </footer>
</body>
<script href="/js/script.js"></script>
</html>
